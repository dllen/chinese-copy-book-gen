<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>字帖生成器测试</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
  <h1 class="h5">单元测试</h1>
  <div id="out" class="mt-3"></div>
  <script src="./app.js"></script>
  <script>
    function assert(name, cond){ const el=document.createElement('div'); el.textContent=(cond?'✅ ':'❌ ')+name; document.getElementById('out').appendChild(el); }
    const m=window.__copybook__;
    assert('split 多字', JSON.stringify(m.splitInput('多字','学习'))===JSON.stringify(['学','习']));
    assert('split 多词', JSON.stringify(m.splitInput('多词','你好|世界'))===JSON.stringify(['你好','世界']));
    assert('split 文章', m.splitInput('文章','我 爱 学 习').length===4);
    const pages=m.paginate([[...'abcdef']],2,2,false);
    assert('paginate 页数', pages.length===2);
    assert('svg 田字格', m.svgDataURL('田字格',60,'#000').includes('svg'));
  </script>
</body>
</html>
